<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐾 昕昕的单词本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 20px;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        /* 模式切换 Tab */
        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .mode-tab {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            border-radius: 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .mode-tab .tab-icon {
            font-size: 20px;
        }
        
        .mode-tab .tab-label {
            font-size: 12px;
        }
        
        .mode-tab.active {
            background: white;
            color: #764ba2;
            border-color: white;
        }
        
        .card-container {
            position: relative;
            height: 420px;
            margin: 20px 0;
            touch-action: pan-y;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            overflow: hidden;
        }
        
        .word-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            perspective: 1000px;
            will-change: transform, opacity;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .word-card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 24px;
            padding: 30px;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .card-back .word-title {
            color: white;
        }
        
        .card-back .word-phonetic {
            color: rgba(255,255,255,0.8);
        }
        
        .card-back .word-meaning {
            color: white;
            font-size: 24px;
        }
        
        .card-back .word-example {
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.95);
        }
        
        .card-back .word-example .cn {
            color: rgba(255,255,255,0.7);
        }
        
        .card-back .memory-tip {
            background: rgba(255,255,255,0.15);
            border-left-color: rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.95);
        }
        
        .card-back .word-pos {
            background: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.9);
        }
        
        .card-back .word-category {
            background: rgba(255,255,255,0.25);
        }
        
        .card-back .word-number {
            color: rgba(255,255,255,0.6);
        }
        
        .card-back .flip-hint-back {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-top: auto;
        }
        
        /* 句子卡片样式 */
        .card-front .sentence-main,
        .card-back .sentence-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .sentence-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .card-back .sentence-text {
            color: white;
        }
        
        .sentence-cn {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .card-back .sentence-cn {
            color: rgba(255,255,255,0.85);
        }
        
        .sentence-grammar {
            font-size: 13px;
            color: #764ba2;
            padding: 10px 15px;
            background: linear-gradient(135deg, #f3e7ff 0%, #e8d5f7 100%);
            border-radius: 12px;
            border-left: 4px solid #764ba2;
        }
        
        .card-back .sentence-grammar {
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.95);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .word-number {
            font-size: 14px;
            color: #999;
        }
        
        .card-back .word-number {
            color: rgba(255,255,255,0.6);
        }
        
        .word-category {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .card-back .word-category {
            background: rgba(255,255,255,0.25);
        }
        
        .word-main {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .word-title {
            font-size: 42px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .word-phonetic {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .card-back .word-phonetic {
            color: rgba(255,255,255,0.8);
        }
        
        .word-pos {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .card-back .word-pos {
            background: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.9);
        }
        
        .word-meaning {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .card-back .word-meaning {
            color: white;
        }
        
        .word-example {
            font-size: 14px;
            color: #666;
            font-style: italic;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .card-back .word-example {
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.95);
        }
        
        .word-example .cn {
            color: #999;
            margin-top: 5px;
        }
        
        .card-back .word-example .cn {
            color: rgba(255,255,255,0.7);
        }
        
        .memory-tip {
            font-size: 13px;
            color: #764ba2;
            padding: 12px;
            background: linear-gradient(135deg, #f3e7ff 0%, #e8d5f7 100%);
            border-radius: 12px;
            border-left: 4px solid #764ba2;
        }
        
        .card-back .memory-tip {
            background: rgba(255,255,255,0.15);
            border-left-color: rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.95);
        }
        
        .memory-tip::before {
            content: "💡 记忆技巧：";
            font-weight: bold;
        }
        
        /* 对话卡片样式 */
        .dialogue-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            overflow: hidden;
        }
        
        .dialogue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .dialogue-scene {
            font-size: 16px;
            font-weight: bold;
        }
        
        .dialogue-progress {
            font-size: 13px;
            opacity: 0.8;
        }
        
        .dialogue-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .dialogue-line {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .dialogue-line.speaker-a {
            flex-direction: row;
        }
        
        .dialogue-line.speaker-b {
            flex-direction: row-reverse;
        }
        
        .dialogue-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .speaker-a .dialogue-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .speaker-b .dialogue-avatar {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }
        
        .dialogue-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.4;
        }
        
        .speaker-a .dialogue-bubble {
            background: #f0f4ff;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .speaker-b .dialogue-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .dialogue-cn {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        
        .speaker-b .dialogue-cn {
            color: rgba(255,255,255,0.7);
            text-align: right;
        }
        
        .dialogue-footer {
            padding: 15px;
            text-align: center;
            color: #999;
            font-size: 13px;
            border-top: 1px solid #f0f0f0;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:hover {
            transform: scale(1.1);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-play {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 28px;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        
        .category-filter::-webkit-scrollbar {
            display: none;
        }
        
        .filter-btn {
            flex-shrink: 0;
            padding: 8px 16px;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .filter-btn.active {
            background: white;
            color: #764ba2;
            border-color: white;
        }
        
        .flip-hint {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 15px;
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 30px;
            padding-bottom: 20px;
        }
        
        /* 隐藏非当前模式的内容 */
        .mode-content {
            display: none;
        }
        
        .mode-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐾 昕昕的单词本</h1>
            <div class="subtitle">快乐学英语，每天进步一点点</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalWords">31</div>
                    <div class="stat-label">单词总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="learnedWords">0</div>
                    <div class="stat-label">已学习</div>
                </div>
            </div>
        </div>
        
        <!-- 模式切换 Tab -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="words">
                <span class="tab-icon">📖</span>
                <span class="tab-label">单词</span>
            </button>
            <button class="mode-tab" data-mode="sentences">
                <span class="tab-icon">💬</span>
                <span class="tab-label">句子</span>
            </button>
            <button class="mode-tab" data-mode="dialogues">
                <span class="tab-icon">🗣️</span>
                <span class="tab-label">对话</span>
            </button>
        </div>
        
        <!-- 单词模式 -->
        <div class="mode-content active" id="wordsMode">
            <div class="category-filter">
                <button class="filter-btn active" data-category="all">全部</button>
                <button class="filter-btn" data-category="letter">字母</button>
                <button class="filter-btn" data-category="number">数字</button>
                <button class="filter-btn" data-category="noun">名词</button>
                <button class="filter-btn" data-category="adj">形容词</button>
                <button class="filter-btn" data-category="family">家庭</button>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            
            <div class="card-container" id="wordCardContainer"></div>
            
            <div class="controls">
                <button class="btn" id="prevBtn">⬅️</button>
                <button class="btn btn-play" id="playBtn">🔊</button>
                <button class="btn" id="nextBtn">➡️</button>
            </div>
            
            <div class="flip-hint">👆 点击卡片翻转（正面：单词 / 背面：例句+记忆技巧）| ⬅️➡️ 左右滑动切换</div>
        </div>
        
        <!-- 句子模式 -->
        <div class="mode-content" id="sentencesMode">
            <div class="category-filter">
                <button class="filter-btn active" data-sent-category="all">全部</button>
                <button class="filter-btn" data-sent-category="greeting">问候</button>
                <button class="filter-btn" data-sent-category="daily">日常</button>
                <button class="filter-btn" data-sent-category="school">学校</button>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="sentProgressFill" style="width: 0%"></div>
            </div>
            
            <div class="card-container" id="sentenceCardContainer"></div>
            
            <div class="controls">
                <button class="btn" id="sentPrevBtn">⬅️</button>
                <button class="btn btn-play" id="sentPlayBtn">🔊</button>
                <button class="btn" id="sentNextBtn">➡️</button>
            </div>
            
            <div class="flip-hint">👆 点击卡片翻转（正面：英文 / 背面：中文+语法点）| ⬅️➡️ 左右滑动切换</div>
        </div>
        
        <!-- 对话模式 -->
        <div class="mode-content" id="dialoguesMode">
            <div class="category-filter">
                <button class="filter-btn active" data-dia-category="all">全部</button>
                <button class="filter-btn" data-dia-category="greeting">问候</button>
                <button class="filter-btn" data-dia-category="introduction">介绍</button>
                <button class="filter-btn" data-dia-category="shopping">购物</button>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="diaProgressFill" style="width: 0%"></div>
            </div>
            
            <div class="card-container" id="dialogueCardContainer"></div>
            
            <div class="controls">
                <button class="btn" id="diaPrevBtn">⬅️</button>
                <button class="btn btn-play" id="diaPlayBtn">🔊</button>
                <button class="btn" id="diaNextBtn">➡️</button>
            </div>
            
            <div class="flip-hint">👆 点击卡片切换下一句 | ⬅️➡️ 切换对话</div>
        </div>
        
        <div class="footer">
            Made with 🐾 by 旺财<br>
            更新于 2026-04-25 21:48:04
        </div>
    </div>

    <script>
        // ============ 单词数据 ============
        const words = [
            { word: "big", phonetic: "[bɪɡ]", pos: "adj.", meaning: "大的，巨大的", example: "Look at that big apple!", exampleCn: "看那个大苹果！", tip: "想象一只巨大的蜜蜂（bee）+ 哥哥（g）= 大哥哥 = big（大的）", category: "adj" },
            { word: "little", phonetic: "[ˈlɪtl]", pos: "adj.", meaning: "小的，小巧的", example: "I have a little dog.", exampleCn: "我有一只小狗。", tip: "little 里面有 \"lit\"（点燃），小蜡烛点燃后小小的火苗", category: "adj" },
            { word: "big A", phonetic: "[eɪ]", pos: "n.", meaning: "大写字母A", example: "Big A looks like a mountain.", exampleCn: "大写A像一座山。", tip: "大写A像一座尖尖的大山峰，高高大大 = big A", category: "letter" },
            { word: "little a", phonetic: "[eɪ]", pos: "n.", meaning: "小写字母a", example: "Little a looks like an apple.", exampleCn: "小写a像苹果。", tip: "小写a像一个小苹果圆圆的，小小的 = little a", category: "letter" },
            { word: "apple", phonetic: "[ˈæpl]", pos: "n.", meaning: "苹果", example: "I like to eat apples.", exampleCn: "我喜欢吃苹果。", tip: "A-P-P-L-E，A for Apple，苹果圆圆红红的", category: "noun" },
            { word: "one", phonetic: "[wʌn]", pos: "num.", meaning: "一，一个", example: "I have one apple.", exampleCn: "我有一个苹果。", tip: "one 发音像\"万\"，从一开始才能到一万", category: "number" },
            { word: "two", phonetic: "[tuː]", pos: "num.", meaning: "二，两个", example: "I have two hands.", exampleCn: "我有两只手。", tip: "two 发音像\"兔\"，两只兔子跳跳跳", category: "number" },
            { word: "three", phonetic: "[θriː]", pos: "num.", meaning: "三，三个", example: "Three little birds.", exampleCn: "三只小鸟。", tip: "three 里面有 \"tree\"（树），三棵树", category: "number" },
            { word: "four", phonetic: "[fɔːr]", pos: "num.", meaning: "四，四个", example: "Four seasons in a year.", exampleCn: "一年有四季。", tip: "four 发音像\"佛\"，四个小佛祖", category: "number" },
            { word: "big B", phonetic: "[biː]", pos: "n.", meaning: "大写字母B", example: "Big B looks like two mountains.", exampleCn: "大写B像两座山连在一起。", tip: "大写B像两个大肚皮叠在一起，胖胖的 = big B", category: "letter" },
            { word: "little b", phonetic: "[biː]", pos: "n.", meaning: "小写字母b", example: "Little b is a line with a ball.", exampleCn: "小写b是一条线加一个小球。", tip: "小写b像一根棒球棒，小小的 = little b", category: "letter" },
            { word: "five", phonetic: "[faɪv]", pos: "num.", meaning: "五，五个", example: "I have five fingers.", exampleCn: "我有五根手指。", tip: "five 发音像\"爱我\"，五根手指比心爱你的形状", category: "number" },
            { word: "six", phonetic: "[sɪks]", pos: "num.", meaning: "六，六个", example: "Six little ducks.", exampleCn: "六只小鸭子。", tip: "six 发音像\"谁可死\"，六六大顺，谁都不死", category: "number" },

            youdaoAudio.play().catch(() => {
                // 2. 有道失败，尝试Google TTS
                const googleAudio = new Audio('https://translate.google.com/translate_tts?ie=UTF-8&q=' + encodeURIComponent(cleanText) + '&tl=en&client=tw-ob');
                googleAudio.play().catch(() => {
                    // 3. Google也失败，使用浏览器语音合成
                    if ('speechSynthesis' in window) {
                        speechSynthesis.cancel();
                        const u = new SpeechSynthesisUtterance(cleanText);
                        u.lang = 'en-US';
                        u.rate = 0.85;
                        speechSynthesis.speak(u);
                    }
                });
            });
        }

        sentPrevBtn.addEventListener('click', () => {
            if (sentIndex > 0) {
                sentFlipped = false;
                sentIndex--;
                renderSentenceCards();
            }
        });

        sentNextBtn.addEventListener('click', () => {
            if (sentIndex < filteredSentences.length - 1) {
                sentFlipped = false;
                sentIndex++;
                renderSentenceCards();
            }
        });

        sentPlayBtn.addEventListener('click', speakSentence);

        document.querySelectorAll('#sentencesMode .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#sentencesMode .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterSentences(btn.dataset.sentCategory);
            });
        });

        // ============ 对话模式 ============
        let diaIndex = 0;
        let filteredDialogues = [...dialogues];
        let diaCategory = 'all';
        let currentLineIndex = 0;

        const dialogueCardContainer = document.getElementById('dialogueCardContainer');
        const diaPrevBtn = document.getElementById('diaPrevBtn');
        const diaNextBtn = document.getElementById('diaNextBtn');
        const diaPlayBtn = document.getElementById('diaPlayBtn');
        const diaProgressFill = document.getElementById('diaProgressFill');

        function createDialogueCard(dialogue, index) {
            const card = document.createElement('div');
            card.className = 'dialogue-card';
            
            const linesHtml = dialogue.lines.map((line, i) => {
                const showClass = i <= currentLineIndex ? '' : 'hidden-line';
                return `
                    <div class="dialogue-line ${line.speaker === 'A' ? 'speaker-a' : 'speaker-b'} ${showClass}">
                        <div class="dialogue-avatar">${line.speaker}</div>
                        <div class="dialogue-bubble">
                            ${line.text}
                            <div class="dialogue-cn">${line.cn}</div>
                        </div>
                    </div>
                `;
            }).join('');

            card.innerHTML = `
                <div class="dialogue-header">
                    <span class="dialogue-scene">🏷️ ${dialogue.scene}</span>
                    <span class="dialogue-progress">${index + 1} / ${filteredDialogues.length}</span>
                </div>
                <div class="dialogue-body">
                    ${linesHtml}
                </div>
                <div class="dialogue-footer">
                    👆 点击卡片继续 | ${dialogue.lines.length} 句话
                </div>
            `;

            // 点击卡片显示下一句
            card.addEventListener('click', () => {
                if (currentLineIndex < dialogue.lines.length - 1) {
                    currentLineIndex++;
                    updateDialogueDisplay(card, dialogue);
                }
            });

            return card;
        }

        function updateDialogueDisplay(card, dialogue) {
            const lines = card.querySelectorAll('.dialogue-line');
            lines.forEach((line, i) => {
                if (i <= currentLineIndex) {
                    line.classList.remove('hidden-line');
                }
            });
        }

        function renderDialogueCards() {
            dialogueCardContainer.innerHTML = '';
            const card = createDialogueCard(filteredDialogues[diaIndex], diaIndex);
            dialogueCardContainer.appendChild(card);
            updateDiaProgress();
        }

        function updateDiaProgress() {
            const progress = ((diaIndex + 1) / filteredDialogues.length) * 100;
            diaProgressFill.style.width = `${progress}%`;
        }

        function filterDialogues(category) {
            diaCategory = category;
            if (category === 'all') {
                filteredDialogues = [...dialogues];
            } else {
                filteredDialogues = dialogues.filter(d => d.category === category);
            }
            diaIndex = 0;
            currentLineIndex = 0;
            renderDialogueCards();
        }

        function speakDialogue() {
            const dialogue = filteredDialogues[diaIndex];
            const text = dialogue.lines.map(l => l.text).join(' ');
            const cleanText = text.trim();
            
            // 1. 优先使用有道词典TTS
            const youdaoAudio = new Audio('https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(cleanText) + '&type=1');
            youdaoAudio.play().catch(() => {
                // 2. 有道失败，尝试Google TTS
                const googleAudio = new Audio('https://translate.google.com/translate_tts?ie=UTF-8&q=' + encodeURIComponent(cleanText) + '&tl=en&client=tw-ob');
                googleAudio.play().catch(() => {
                    // 3. Google也失败，使用浏览器语音合成
                    if ('speechSynthesis' in window) {
                        speechSynthesis.cancel();
                        const u = new SpeechSynthesisUtterance(cleanText);
                        u.lang = 'en-US';
                        u.rate = 0.85;
                        speechSynthesis.speak(u);
                    }
                });
            });
        }

        diaPrevBtn.addEventListener('click', () => {
            if (diaIndex > 0) {
                diaIndex--;
                currentLineIndex = 0;
                renderDialogueCards();
            }
        });

        diaNextBtn.addEventListener('click', () => {
            if (diaIndex < filteredDialogues.length - 1) {
                diaIndex++;
                currentLineIndex = 0;
                renderDialogueCards();
            }
        });

        diaPlayBtn.addEventListener('click', speakDialogue);

        document.querySelectorAll('#dialoguesMode .filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#dialoguesMode .filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterDialogues(btn.dataset.diaCategory);
            });
        });

        // ============ 模式切换 ============
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.querySelectorAll('.mode-content').forEach(content => {
                    content.classList.remove('active');
                });
                
                const mode = tab.dataset.mode;
                document.getElementById(mode + 'Mode').classList.add('active');
            });
        });

        // ============ 初始化 ============
        renderCards();
        renderSentenceCards();
        renderDialogueCards();
    </script>
</body>
</html>
