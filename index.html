<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐾 昕昕的单词本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 20px;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .card-container {
            position: relative;
            height: 420px;
            margin: 20px 0;
            touch-action: pan-y;
            user-select: none;
            -webkit-user-select: none;
        }
        
        .word-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            perspective: 1000px;
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        
        .word-card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 24px;
            padding: 30px;
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .card-back .word-title {
            color: white;
        }
        
        .card-back .word-phonetic {
            color: rgba(255,255,255,0.8);
        }
        
        .card-back .word-meaning {
            color: white;
            font-size: 24px;
        }
        
        .card-back .word-example {
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.95);
        }
        
        .card-back .word-example .cn {
            color: rgba(255,255,255,0.7);
        }
        
        .card-back .memory-tip {
            background: rgba(255,255,255,0.15);
            border-left-color: rgba(255,255,255,0.5);
            color: rgba(255,255,255,0.95);
        }
        
        .card-back .word-pos {
            background: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.9);
        }
        
        .card-back .word-category {
            background: rgba(255,255,255,0.25);
        }
        
        .card-back .word-number {
            color: rgba(255,255,255,0.6);
        }
        
        .word-card.active {
            z-index: 10;
        }
        
        .word-card.prev {
            transform: translateX(-30px) scale(0.95);
            opacity: 0.5;
            z-index: 5;
        }
        
        .word-card.next {
            transform: translateX(30px) scale(0.95);
            opacity: 0.5;
            z-index: 5;
        }
        
        .card-back .flip-hint-back {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            margin-top: auto;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .word-number {
            font-size: 14px;
            color: #999;
        }
        
        .word-category {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        .word-main {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .word-title {
            font-size: 42px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .word-phonetic {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .word-pos {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .word-meaning {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .word-example {
            font-size: 14px;
            color: #666;
            font-style: italic;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .word-example .cn {
            color: #999;
            margin-top: 5px;
        }
        
        .memory-tip {
            font-size: 13px;
            color: #764ba2;
            padding: 12px;
            background: linear-gradient(135deg, #f3e7ff 0%, #e8d5f7 100%);
            border-radius: 12px;
            border-left: 4px solid #764ba2;
        }
        
        .memory-tip::before {
            content: "💡 记忆技巧：";
            font-weight: bold;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn:hover {
            transform: scale(1.1);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-play {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 28px;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        
        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        
        .category-filter::-webkit-scrollbar {
            display: none;
        }
        
        .filter-btn {
            flex-shrink: 0;
            padding: 8px 16px;
            border: 2px solid rgba(255,255,255,0.5);
            background: transparent;
            color: white;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .filter-btn.active {
            background: white;
            color: #764ba2;
            border-color: white;
        }
        
        .flip-hint {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 15px;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .word-card {
            animation: slideIn 0.4s ease;
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            margin-top: 30px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐾 昕昕的单词本</h1>
            <div class="subtitle">快乐学英语，每天进步一点点</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalWords">25</div>
                    <div class="stat-label">单词总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="learnedWords">0</div>
                    <div class="stat-label">已学习</div>
                </div>
            </div>
        </div>
        
        <div class="category-filter">
            <button class="filter-btn active" data-category="all">全部</button>
            <button class="filter-btn" data-category="letter">字母</button>
            <button class="filter-btn" data-category="number">数字</button>
            <button class="filter-btn" data-category="noun">名词</button>
            <button class="filter-btn" data-category="adj">形容词</button>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        
        <div class="card-container" id="cardContainer">
            <!-- 卡片将通过 JS 动态生成 -->
        </div>
        
        <div class="controls">
            <button class="btn" id="prevBtn">⬅️</button>
            <button class="btn btn-play" id="playBtn">🔊</button>
            <button class="btn" id="nextBtn">➡️</button>
        </div>
        
        <div class="flip-hint">👆 点击卡片翻转（正面：单词 / 背面：例句+记忆技巧）| ⬅️➡️ 左右滑动切换</div>
        
        <div class="footer">
            Made with 🐾 by 旺财<br>
            更新于 2026-04-04
        </div>
    </div>

    <script>
        const words = [
            { word: "big", phonetic: "[bɪɡ]", pos: "adj.", meaning: "大的，巨大的", example: "Look at that big apple!", exampleCn: "看那个大苹果！", tip: "想象一只巨大的蜜蜂（bee）+ 哥哥（g）= 大哥哥 = big（大的）", category: "adj" },
            { word: "little", phonetic: "[ˈlɪtl]", pos: "adj.", meaning: "小的，小巧的", example: "I have a little dog.", exampleCn: "我有一只小狗。", tip: "little 里面有 \"lit\"（点燃），小蜡烛点燃后小小的火苗", category: "adj" },
            { word: "big A", phonetic: "[eɪ]", pos: "n.", meaning: "大写字母A", example: "Big A looks like a mountain.", exampleCn: "大写A像一座山。", tip: "大写A像一座尖尖的大山峰，高高大大 = big A", category: "letter" },
            { word: "little a", phonetic: "[eɪ]", pos: "n.", meaning: "小写字母a", example: "Little a looks like an apple.", exampleCn: "小写a像苹果。", tip: "小写a像一个小苹果圆圆的，小小的 = little a", category: "letter" },
            { word: "apple", phonetic: "[ˈæpl]", pos: "n.", meaning: "苹果", example: "I like to eat apples.", exampleCn: "我喜欢吃苹果。", tip: "A-P-P-L-E，A for Apple，苹果圆圆红红的", category: "noun" },
            { word: "one", phonetic: "[wʌn]", pos: "num.", meaning: "一，一个", example: "I have one apple.", exampleCn: "我有一个苹果。", tip: "one 发音像\"万\"，从一开始才能到一万", category: "number" },
            { word: "two", phonetic: "[tuː]", pos: "num.", meaning: "二，两个", example: "I have two hands.", exampleCn: "我有两只手。", tip: "two 发音像\"兔\"，两只兔子跳跳跳", category: "number" },
            { word: "three", phonetic: "[θriː]", pos: "num.", meaning: "三，三个", example: "Three little birds.", exampleCn: "三只小鸟。", tip: "three 里面有 \"tree\"（树），三棵树", category: "number" },
            { word: "four", phonetic: "[fɔːr]", pos: "num.", meaning: "四，四个", example: "Four seasons in a year.", exampleCn: "一年有四季。", tip: "four 发音像\"佛\"，四个小佛祖", category: "number" },
            { word: "big B", phonetic: "[biː]", pos: "n.", meaning: "大写字母B", example: "Big B looks like two mountains.", exampleCn: "大写B像两座山连在一起。", tip: "大写B像两个大肚皮叠在一起，胖胖的 = big B", category: "letter" },
            { word: "little b", phonetic: "[biː]", pos: "n.", meaning: "小写字母b", example: "Little b is a line with a ball.", exampleCn: "小写b是一条线加一个小球。", tip: "小写b像一根棒球棒，小小的 = little b", category: "letter" },
            { word: "five", phonetic: "[faɪv]", pos: "num.", meaning: "五，五个", example: "I have five fingers.", exampleCn: "我有五根手指。", tip: "five 发音像\"爱我\"，五根手指比心爱你的形状", category: "number" },
            { word: "six", phonetic: "[sɪks]", pos: "num.", meaning: "六，六个", example: "Six little ducks.", exampleCn: "六只小鸭子。", tip: "six 发音像\"谁可死\"，六六大顺，谁都不死", category: "number" },
            { word: "seven", phonetic: "[ˈsevn]", pos: "num.", meaning: "七，七个", example: "Seven days in a week.", exampleCn: "一周有七天。", tip: "seven 发音像\"塞文\"，七天塞满一星期", category: "number" },
            { word: "dad", phonetic: "[dæd]", pos: "n.", meaning: "爸爸", example: "I love my dad.", exampleCn: "我爱我的爸爸。", tip: "dad 发音像\"呆呆\"，爸爸有时候看起来呆呆的", category: "noun" },
            { word: "ant", phonetic: "[ænt]", pos: "n.", meaning: "蚂蚁", example: "The ant is carrying a small leaf.", exampleCn: "那只蚂蚁正在搬一片小叶子。", tip: "ant 发音像\"安特\"，蚂蚁家族安安静静地特别勤劳", category: "noun" },
            { word: "mouth", phonetic: "[maʊθ]", pos: "n.", meaning: "嘴巴", example: "Open your mouth wide.", exampleCn: "把你的嘴巴张大。", tip: "mouth 里有 \"outh\"，嘴巴张成 O 形", category: "noun" },
            { word: "nose", phonetic: "[noʊz]", pos: "n.", meaning: "鼻子", example: "My nose is cold.", exampleCn: "我的鼻子好冷。", tip: "nose 发音像\"钮子\"，鼻子像两颗钮子", category: "noun" },
            { word: "eye", phonetic: "[aɪ]", pos: "n.", meaning: "眼睛", example: "The eye is the window of the soul.", exampleCn: "眼睛是心灵的窗户。", tip: "eye 发音像\"爱\"，用眼睛表达爱意", category: "noun" },
            { word: "banana", phonetic: "[bəˈnænə]", pos: "n.", meaning: "香蕉", example: "I eat a banana every day.", exampleCn: "我每天吃一根香蕉。", tip: "ba-na-na，像剥香蕉皮时\"吧嗒吧嗒\"的声音", category: "noun" },
            { word: "big C", phonetic: "[siː]", pos: "n.", meaning: "大写字母C", example: "Big C looks like a half moon.", exampleCn: "大写C像半个月亮。", tip: "大写C像一个弯弯的月亮，大大的月牙 = big C", category: "letter" },
            { word: "little c", phonetic: "[siː]", pos: "n.", meaning: "小写字母c", example: "Little c is a small curve.", exampleCn: "小写c是一个小弯钩。", tip: "小写c像一个小小的逗号，小小的 = little c", category: "letter" },
            { word: "eight", phonetic: "[eɪt]", pos: "num.", meaning: "八，八个", example: "Eight legs on a spider.", exampleCn: "蜘蛛有八条腿。", tip: "eight 发音像\"爱特\"，八八八，发发发", category: "number" },
            { word: "ear", phonetic: "[ɪr]", pos: "n.", meaning: "耳朵", example: "I can hear with my ear.", exampleCn: "我可以用耳朵听声音。", tip: "ear 里有 \"ear\" 像耳朵的形状，E 是外耳，A 是内耳", category: "noun" },
            { word: "neck", phonetic: "[nek]", pos: "n.", meaning: "脖子，颈部", example: "The giraffe has a long neck.", exampleCn: "长颈鹿有一条长长的脖子。", tip: "neck 发音像\"耐克\"，脖子像耐克标志一样长", category: "noun" }
        ];

        let currentIndex = 0;
        let filteredWords = [...words];
        let currentCategory = 'all';
        let isFlipped = false;

        const cardContainer = document.getElementById('cardContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const totalWordsEl = document.getElementById('totalWords');
        const learnedWordsEl = document.getElementById('learnedWords');

        function renderCards() {
            isSwiping = false;
            swipeDelta = 0;
            cardContainer.innerHTML = '';
            
            filteredWords.forEach((word, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                if (index === currentIndex) card.classList.add('active');
                else if (index === currentIndex - 1) card.classList.add('prev');
                else if (index === currentIndex + 1) card.classList.add('next');
                else card.style.display = 'none';
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-header">
                                <span class="word-number">${index + 1} / ${filteredWords.length}</span>
                                <span class="word-category">${getCategoryName(word.category)}</span>
                            </div>
                            <div class="word-main">
                                <div class="word-title">${word.word}</div>
                                <div class="word-phonetic">${word.phonetic}</div>
                                <span class="word-pos">${word.pos}</span>
                                <div class="word-meaning">${word.meaning}</div>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="card-header">
                                <span class="word-number">${index + 1} / ${filteredWords.length}</span>
                                <span class="word-category">${getCategoryName(word.category)}</span>
                            </div>
                            <div class="word-main">
                                <div class="word-title">${word.word}</div>
                                <div class="word-phonetic">${word.phonetic}</div>
                                <span class="word-pos">${word.pos}</span>
                                <div class="word-meaning">${word.meaning}</div>
                                <div class="word-example">
                                    ${word.example}
                                    <div class="cn">${word.exampleCn}</div>
                                </div>
                                <div class="memory-tip">${word.tip}</div>
                            </div>
                            <div class="flip-hint-back">👆 点击卡片返回正面</div>
                        </div>
                    </div>
                `;
                
                cardContainer.appendChild(card);
                
                // 点击卡片翻转
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.controls')) return; // 忽略按钮区域点击
                    card.classList.toggle('flipped');
                    isFlipped = !isFlipped;
                });
            });
            
            updateProgress();
        }

        function getCategoryName(cat) {
            const names = { letter: '字母', number: '数字', noun: '名词', adj: '形容词' };
            return names[cat] || cat;
        }

        function updateProgress() {
            const progress = ((currentIndex + 1) / filteredWords.length) * 100;
            progressFill.style.width = `${progress}%`;
            learnedWordsEl.textContent = currentIndex + 1;
        }

        function filterWords(category) {
            currentCategory = category;
            if (category === 'all') {
                filteredWords = [...words];
            } else {
                filteredWords = words.filter(w => w.category === category);
            }
            currentIndex = 0;
            isFlipped = false;
            totalWordsEl.textContent = filteredWords.length;
            renderCards();
        }

        function speakCurrentWord() {
            const word = filteredWords[currentIndex].word;
            // 使用有道词典发音接口，国内手机全兼容
            const audio = new Audio('https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(word) + '&type=1');
            audio.play().catch(() => {
                // 备用：浏览器原生语音
                if ('speechSynthesis' in window) {
                    speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(word);
                    u.lang = 'en-US';
                    u.rate = 0.8;
                    speechSynthesis.speak(u);
                }
            });
        }

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                isFlipped = false;
                currentIndex--;
                renderCards();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < filteredWords.length - 1) {
                isFlipped = false;
                currentIndex++;
                renderCards();
            }
        });

        playBtn.addEventListener('click', speakCurrentWord);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filterWords(btn.dataset.category);
            });
        });

        // 触摸滑动支持
        let touchStartX = 0;
        let touchStartY = 0;
        let isSwiping = false;
        let swipeDelta = 0;

        cardContainer.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isSwiping = true;
            swipeDelta = 0;
        }, { passive: true });

        cardContainer.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const diffX = currentX - touchStartX;
            const diffY = Math.abs(currentY - touchStartY);
            // 水平滑动为主时才处理
            if (Math.abs(diffX) > diffY) {
                e.preventDefault();
                swipeDelta = diffX;
                updateCardOffset(diffX);
            }
        }, { passive: false });

        cardContainer.addEventListener('touchend', (e) => {
            if (!isSwiping) return;
            isSwiping = false;
            const threshold = cardContainer.offsetWidth * 0.3;
            if (swipeDelta > threshold && currentIndex > 0) {
                isFlipped = false;
                currentIndex--;
                renderCards();
            } else if (swipeDelta < -threshold && currentIndex < filteredWords.length - 1) {
                isFlipped = false;
                currentIndex++;
                renderCards();
            } else {
                renderCards();
            }
        }, { passive: true });

        function updateCardOffset(diffX) {
            const cards = cardContainer.querySelectorAll('.word-card');
            const w = cardContainer.offsetWidth;
            cards.forEach((card, index) => {
                if (index === currentIndex) {
                    card.style.transform = `translateX(${diffX}px) scale(${1 - Math.abs(diffX) / w * 0.1})`;
                    card.style.opacity = 1 - Math.abs(diffX) / w * 0.4;
                    card.style.zIndex = 10;
                } else if (index === currentIndex - 1 && diffX > 0) {
                    card.style.display = '';
                    card.classList.add('active');
                    card.style.transform = `translateX(${-30 + diffX}px) scale(${0.95 + diffX / w * 0.03})`;
                    card.style.opacity = 0.5 + diffX / w * 0.5;
                    card.style.zIndex = 10;
                } else if (index === currentIndex + 1 && diffX < 0) {
                    card.style.display = '';
                    card.classList.add('active');
                    card.style.transform = `translateX(${30 + diffX}px) scale(${0.95 + Math.abs(diffX) / w * 0.03})`;
                    card.style.opacity = 0.5 + Math.abs(diffX) / w * 0.5;
                    card.style.zIndex = 10;
                } else {
                    card.style.transform = '';
                    card.style.opacity = '';
                    card.style.zIndex = '';
                }
            });
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                isFlipped = false;
                currentIndex--;
                renderCards();
            } else if (e.key === 'ArrowRight' && currentIndex < filteredWords.length - 1) {
                isFlipped = false;
                currentIndex++;
                renderCards();
            } else if (e.key === ' ') {
                e.preventDefault();
                speakCurrentWord();
            }
        });

        // 初始化
        renderCards();
    </script>
</body>
</html>
